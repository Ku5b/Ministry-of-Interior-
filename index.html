<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الداخلية | الرئيسية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: #f8fafc; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* الهيدر المحسن باللون الأزرق الملكي */
        .nav-bar {
            position: fixed; top: 0; width: 100%; padding: 12px 10px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        .nav-link { font-size: 0.8rem; font-weight: 700; color: #94a3b8; transition: 0.3s; text-decoration: none; white-space: nowrap; }
        .nav-link:hover { color: #38bdf8; }

        /* الواجهة الرئيسية */
        .hero-section {
            height: 100vh;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        .hero-title { 
            font-size: clamp(3rem, 10vw, 6rem); 
            font-weight: 900; 
            margin-bottom: 0px; 
            color: #ffffff; 
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .hero-sub { 
            color: #38bdf8; 
            font-size: 1rem; 
            margin-top: 15px; 
            font-weight: 700; 
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* السهم القريب جداً والمطور */
        .scroll-arrow { 
            margin-top: 20px; 
            color: #38bdf8; 
            font-size: 2.2rem;
            animation: bounce 2s infinite;
            text-decoration: none;
            opacity: 0.7;
        }

        /* زر بوابة المنسوبين الفضي */
        .btn-portal {
            font-size: 0.75rem; font-weight: 900; color: #38bdf8; 
            border: 1px solid rgba(56, 189, 248, 0.3); padding: 8px 20px; 
            border-radius: 12px; transition: 0.4s; text-decoration: none;
            background: rgba(56, 189, 248, 0.05);
        }
        .btn-portal:hover { 
            background: #38bdf8; 
            color: #020617; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); 
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.2));
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="about.html" class="nav-link">عن الوزارة</a>
        
        <img src="Picsart_23-04-10_00-11-59-326.png" class="h-10 w-auto logo-glow" alt="Logo">
        
        <a href="leaders.html" class="nav-link">القيادة</a>
        
        <a href="staff.html" class="btn-portal">بوابة المنسوبين</a>
    </nav>

    <header class="hero-section">
        <img src="Picsart_24-11-05_13-55-12-224.png" class="w-40 mb-8 logo-glow">
        
        <h1 class="hero-title italic">وزارة الداخلية</h1>
        <p class="hero-sub uppercase">أمان الوطن.. مسؤوليتنا</p>
        
        <a href="#welcome" class="scroll-arrow">
            <i class="fa-solid fa-chevron-down"></i>
        </a>
    </header>

    <footer style="position: absolute; bottom: 25px; width: 100%; text-align: center;">
        <span style="font-size: 11px; color: #334155; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;">
            Kingdom of Saudi Arabia • MOI
        </span>
    </footer>

</body>
</html>
