<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الداخلية | الرئيسية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: white; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* الهيدر المحسن والمتباعد */
        .nav-bar {
            position: fixed; top: 0; width: 100%; padding: 12px 10px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border-bottom: 1px solid #1a1a1a;
        }

        .nav-link { font-size: 0.75rem; font-weight: 700; color: #888; transition: 0.3s; text-decoration: none; white-space: nowrap; }
        .nav-link:hover { color: #d4af37; }

        /* الواجهة الرئيسية */
        .hero-section {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        .hero-title { font-size: clamp(2.8rem, 10vw, 5.5rem); font-weight: 900; margin-bottom: 0px; letter-spacing: -2px; color: white; line-height: 1; }
        .hero-sub { color: #555; font-size: 0.95rem; margin-top: 10px; font-weight: 700; letter-spacing: 1px; }

        /* السهم الملتصق بالنص */
        .scroll-arrow { 
            margin-top: 15px; 
            color: #d4af37; 
            font-size: 2.2rem;
            animation: bounce 2s infinite;
            text-decoration: none;
        }

        .btn-portal {
            font-size: 0.7rem; font-weight: 900; color: #d4af37; 
            border: 1px solid rgba(212, 175, 55, 0.4); padding: 7px 18px; 
            border-radius: 50px; transition: 0.3s; text-decoration: none;
        }
        .btn-portal:hover { background: #d4af37; color: black; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-8px);}
            60% {transform: translateY(-4px);}
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="about.html" class="nav-link">عن الوزارة</a>
        
        <img src="Picsart_23-04-10_00-11-59-326.png" class="h-11 w-auto drop-shadow-[0_0_10px_rgba(212,175,55,0.2)]">
        
        <a href="leaders.html" class="nav-link">القيادة</a>
        
        <a href="staff.html" class="btn-portal">بوابة المنسوبين</a>
    </nav>

    <header class="hero-section">
        <img src="Picsart_24-11-05_13-55-12-224.png" class="w-36 mb-6 drop-shadow-[0_0_25px_rgba(212,175,55,0.25)]">
        
        <h1 class="hero-title italic">وزارة الداخلية</h1>
        <p class="hero-sub uppercase">أمان الوطن.. مسؤوليتنا</p>
        
        <a href="#welcome" class="scroll-arrow">
            <i class="fa-solid fa-chevron-down"></i>
        </a>
    </header>

    <footer style="position: absolute; bottom: 20px; width: 100%; text-align: center;">
        <div style="display: inline-block; background: #050505; padding: 5px 20px; border-radius: 50px; border: 1px solid #111;">
             <span style="font-size: 10px; color: #444; font-weight: 900;">MOI SYSTEM • 2026</span>
        </div>
    </footer>

</body>
</html>
