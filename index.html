<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الداخلية | الرئيسية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: #f8fafc; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* الهيدر */
        .nav-bar {
            position: fixed; top: 0; width: 100%; padding: 12px 10px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        /* الواجهة الرئيسية */
        .hero-section {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        .hero-title { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; color: #ffffff; line-height: 1; }
        .hero-sub { color: #38bdf8; font-size: 1rem; margin-top: 15px; font-weight: 700; letter-spacing: 2px; }

        .scroll-arrow { margin-top: 20px; color: #38bdf8; font-size: 2.2rem; animation: bounce 2s infinite; text-decoration: none; }

        /* قسم الانتقال السريع تحت */
        .quick-access {
            padding: 60px 20px;
            display: grid;
            grid-template-cols: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto;
        }

        .nav-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.1);
            padding: 25px 15px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            transition: 0.4s;
        }

        .nav-card:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            transform: translateY(-5px);
        }

        .nav-card i { font-size: 1.5rem; color: #38bdf8; margin-bottom: 10px; display: block; }
        .nav-card span { font-size: 0.9rem; font-weight: 700; color: white; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <img src="Picsart_23-04-10_00-11-59-326.png" class="h-10 w-auto" alt="Logo">
    </nav>

    <header class="hero-section">
        <img src="Picsart_24-11-05_13-55-12-224.png" class="w-40 mb-8">
        <h1 class="hero-title italic">وزارة الداخلية</h1>
        <p class="hero-sub uppercase">أمان الوطن.. مسؤوليتنا</p>
        
        <a href="#menu" class="scroll-arrow">
            <i class="fa-solid fa-chevron-down"></i>
        </a>
    </header>

    <div id="menu" class="quick-access">
        
        <a href="about.html" class="nav-card">
            <i class="fa-solid fa-info-circle"></i>
            <span>عن الوزارة</span>
        </a>

        <a href="leaders.html" class="nav-card">
            <i class="fa-solid fa-users-rays"></i>
            <span>القيادة</span>
        </a>

        <a href="staff.html" class="nav-card">
            <i class="fa-solid fa-user-shield"></i>
            <span>بوابة المنسوبين</span>
        </a>

    </div>

    <footer style="padding: 40px 0; text-align: center;">
        <span style="font-size: 10px; color: #334155; font-weight: 700; letter-spacing: 4px;">KINGDOM OF SAUDI ARABIA</span>
    </footer>

</body>
</html>
